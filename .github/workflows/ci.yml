name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Cache CMake build
      uses: actions/cache@v4
      with:
        path: |
          build
          !build/tests
        key: cmake-windows-${{ hashFiles('CMakeLists.txt', 'src/**/*.cpp', 'src/**/*.hpp') }}
        restore-keys: cmake-windows-

    - name: Configure CMake
      run: cmake -B build -S .

    - name: Build
      run: cmake --build build --config Release

    - name: Run tests
      run: .\build\tests\Release\lexer_tests.exe

    - name: Test CLI
      run: .\build\Release\lexc.exe --help

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: lexc-windows
        path: build/Release/lexc.exe

  build-linux:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake g++

    - name: Cache CMake build
      uses: actions/cache@v4
      with:
        path: |
          build
          !build/tests
        key: cmake-linux-${{ hashFiles('CMakeLists.txt', 'src/**/*.cpp', 'src/**/*.hpp') }}
        restore-keys: cmake-linux-

    - name: Configure CMake
      run: cmake -B build -S .

    - name: Build
      run: cmake --build build --config Release -j$(nproc)

    - name: Run tests
      run: ./build/tests/lexer_tests

    - name: Test CLI
      run: ./build/lexc --help

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: lexc-linux
        path: build/lexc

  build-macos:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Cache CMake build
      uses: actions/cache@v4
      with:
        path: |
          build
          !build/tests
        key: cmake-macos-${{ hashFiles('CMakeLists.txt', 'src/**/*.cpp', 'src/**/*.hpp') }}
        restore-keys: cmake-macos-

    - name: Configure CMake
      run: cmake -B build -S .

    - name: Build
      run: cmake --build build --config Release -j$(sysctl -n hw.ncpu)

    - name: Run tests
      run: ./build/tests/lexer_tests

    - name: Test CLI
      run: ./build/lexc --help

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: lexc-macos
        path: build/lexc
